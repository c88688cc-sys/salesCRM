<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="销售CRM"/>
  <title>销售CRM系统</title>
  <link rel="manifest" href="manifest.json"/>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;background:#f5f6fa;max-width:480px;margin:0 auto;}
    .header{background:linear-gradient(135deg,#1a73e8,#0d47a1);color:#fff;padding:50px 20px 20px;text-align:center;}
    .header h1{font-size:20px;}
    .header p{font-size:13px;opacity:0.8;margin-top:4px;}
    .tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;display:flex;border-top:1px solid #eee;z-index:100;}
    .tab-item{flex:1;text-align:center;padding:10px 0;font-size:12px;color:#999;cursor:pointer;}
    .tab-item.active{color:#1a73e8;}
    .tab-icon{font-size:22px;display:block;}
    .page{display:none;padding:16px;padding-bottom:80px;}
    .page.active{display:block;}
    .card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 6px rgba(0,0,0,0.06);}
    .btn{display:block;width:100%;padding:14px;border:none;border-radius:10px;font-size:16px;cursor:pointer;text-align:center;}
    .btn-primary{background:#1a73e8;color:#fff;}
    .btn-gray{background:#f0f0f0;color:#666;}
    .btn-sm{padding:6px 14px;border:none;border-radius:6px;font-size:13px;cursor:pointer;}
    .btn-edit-sm{background:#e8f0fe;color:#1a73e8;}
    .btn-del-sm{background:#fff0f0;color:#ff4d4f;}
    .form-group{margin-bottom:14px;}
    .form-label{font-size:13px;color:#555;display:block;margin-bottom:6px;}
    .form-input,.form-select,.form-textarea{width:100%;padding:12px;border:1px solid #e8e8e8;border-radius:8px;font-size:15px;background:#fafafa;outline:none;}
    .form-textarea{min-height:80px;resize:none;}
    .form-input:focus,.form-textarea:focus{border-color:#1a73e8;background:#fff;}
    .tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;}
    .tag-follow{background:#cce5ff;color:#004085;}
    .tag-intent{background:#fff3cd;color:#856404;}
    .tag-deal{background:#d4edda;color:#155724;}
    .tag-lost{background:#f8d7da;color:#721c24;}
    .modal-mask{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:200;}
    .modal-mask.show{display:block;}
    .modal-box{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-radius:20px 20px 0 0;padding:20px;max-height:90vh;overflow-y:auto;z-index:201;}
    .modal-title{font-size:18px;font-weight:bold;text-align:center;margin-bottom:20px;color:#222;}
    .stat-row{display:flex;justify-content:space-around;text-align:center;}
    .stat-num{font-size:36px;font-weight:bold;color:#1a73e8;display:block;}
    .stat-label{font-size:12px;color:#888;margin-top:4px;display:block;}
    .progress-bar{background:#e8f0fe;border-radius:8px;height:12px;overflow:hidden;margin:10px 0;}
    .progress-fill{height:100%;background:#1a73e8;border-radius:8px;transition:width 0.5s ease;}
    .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .stat-card{border-radius:12px;padding:16px;text-align:center;}
    .stat-card.blue{background:#e8f0fe;}
    .stat-card.green{background:#e6f4ea;}
    .stat-card.orange{background:#fef3e2;}
    .stat-card.purple{background:#f3e8fd;}
    .stat-card .num{font-size:28px;font-weight:bold;color:#222;}
    .stat-card .desc{font-size:12px;color:#666;margin-top:4px;}
    .customer-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
    .customer-name{font-size:17px;font-weight:bold;color:#222;}
    .customer-info{font-size:13px;color:#666;margin-bottom:4px;}
    .action-row{display:flex;gap:8px;margin-top:12px;}
    .search-box{display:flex;align-items:center;background:#fff;border-radius:10px;padding:10px 14px;margin-bottom:12px;box-shadow:0 1px 6px rgba(0,0,0,0.06);}
    .search-box input{border:none;outline:none;font-size:15px;flex:1;background:transparent;}
    .login-card{text-align:center;padding:40px 20px;}
    .login-icon{font-size:60px;margin-bottom:16px;}
    .login-title{font-size:22px;font-weight:bold;margin-bottom:8px;}
    .login-sub{font-size:14px;color:#999;margin-bottom:30px;}
    .section-title{font-size:16px;font-weight:bold;color:#333;margin-bottom:12px;padding-left:10px;border-left:4px solid #1a73e8;}
    .goal-preview{background:#f0f7ff;}
    .goal-row{display:flex;justify-content:space-around;text-align:center;}
    .goal-item{display:flex;flex-direction:column;align-items:center;}
    .goal-num{font-size:36px;font-weight:bold;color:#1a73e8;}
    .goal-lbl{font-size:12px;color:#888;margin-top:4px;}
    .empty{text-align:center;color:#bbb;padding:40px 0;font-size:14px;}
    .top-tab{display:flex;background:#fff;border-radius:10px;margin-bottom:14px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,0.06);}
    .top-tab-item{flex:1;text-align:center;padding:12px 0;font-size:14px;color:#666;cursor:pointer;}
    .top-tab-item.active{background:#1a73e8;color:#fff;font-weight:bold;}
    .admin-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
    .admin-title{font-size:18px;font-weight:bold;}
    .admin-btns{display:flex;gap:8px;}
    .sync-btn{background:#e8f0fe;color:#1a73e8;padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer;}
    .out-btn{background:#fff0f0;color:#ff4d4f;padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer;}
    .progress-row{display:flex;justify-content:space-between;font-size:13px;color:#555;margin-bottom:6px;}
    .progress-pct{text-align:right;font-size:13px;color:#1a73e8;font-weight:bold;margin-top:4px;}
    .emp-id{font-size:11px;color:#bbb;margin-bottom:10px;}
    .emp-stat-row{display:flex;justify-content:space-around;text-align:center;}
    .emp-stat-item{display:flex;flex-direction:column;align-items:center;}
    .emp-num{font-size:24px;font-weight:bold;}
    .emp-lbl{font-size:11px;color:#888;margin-top:2px;}
    .green{color:#34a853;} .red{color:#ff4d4f;} .orange{color:#f5a623;} .blue{color:#1a73e8;}
    .shortcut-grid{display:flex;justify-content:space-around;margin-top:4px;}
    .shortcut-item{background:#fff;border-radius:12px;padding:16px 12px;text-align:center;width:30%;box-shadow:0 1px 6px rgba(0,0,0,0.06);cursor:pointer;}
    .shortcut-icon{font-size:30px;margin-bottom:6px;}
    .shortcut-item span{font-size:13px;color:#333;}
    .welcome-card{background:linear-gradient(135deg,#1a73e8,#0d47a1);color:#fff;border-radius:12px;padding:20px;margin-bottom:12px;}
    .welcome-name{font-size:20px;font-weight:bold;}
    .welcome-date{font-size:13px;opacity:0.8;margin-top:4px;}
    .goal-card{margin-bottom:12px;}
    .goal-emp-row{display:flex;justify-content:space-between;margin-bottom:10px;}
    .goal-cols{display:flex;justify-content:space-around;text-align:center;margin-bottom:12px;}
    .goal-col{display:flex;flex-direction:column;align-items:center;}
    .goal-col-num{font-size:22px;font-weight:bold;color:#1a73e8;}
    .goal-col-lbl{font-size:11px;color:#888;margin-top:2px;}
  </style>
</head>
<body>

<div class="header">
  <h1>📈 销售CRM系统</h1>
  <p id="headerSub">加载中...</p>
</div>

<!-- 首页 -->
<div class="page active" id="page-home">
  <div class="welcome-card">
    <div class="welcome-name">你好，<span id="homeUserName">员工</span> 👋</div>
    <div class="welcome-date" id="homeDate"></div>
  </div>
  <div class="section-title">今日目标</div>
  <div class="card" id="homeDailyCard">
    <div class="empty">暂无今日计划，去"目标"页面设定</div>
  </div>
  <div class="section-title">本月销售进度</div>
  <div class="card" id="homeMonthCard">
    <div class="empty">暂无月度计划</div>
  </div>
  <div class="section-title">快捷操作</div>
  <div class="shortcut-grid">
    <div class="shortcut-item" onclick="switchTab('customer')">
      <div class="shortcut-icon">👥</div><span>添加客户</span>
    </div>
    <div class="shortcut-item" onclick="switchTab('goal')">
      <div class="shortcut-icon">🎯</div><span>设定目标</span>
    </div>
    <div class="shortcut-item" onclick="switchTab('admin')">
      <div class="shortcut-icon">📊</div><span>数据看板</span>
    </div>
  </div>
</div>

<!-- 客户页 -->
<div class="page" id="page-customer">
  <div class="search-box">
    <span>🔍</span>
    <input type="text" id="searchInput" placeholder="搜索姓名/电话/公司" oninput="searchCustomers()"/>
  </div>
  <button class="btn btn-primary" onclick="showCustomerForm()" style="margin-bottom:12px;">+ 添加客户</button>
  <div id="customerList"></div>
</div>

<!-- 目标页 -->
<div class="page" id="page-goal">
  <div class="top-tab">
    <div class="top-tab-item active" id="tab-daily"   onclick="switchGoalTab('daily')">📅 日计划</div>
    <div class="top-tab-item"        id="tab-monthly" onclick="switchGoalTab('monthly')">📆 月计划</div>
  </div>
  <div id="goalDaily">
    <div class="section-title" id="dailyTitle">今日目标</div>
    <div class="card">
      <div class="form-group">
        <label class="form-label">👥 今日新增客户目标（人）</label>
        <input class="form-input" type="number" id="d_newCustomers" placeholder="目标人数"/>
      </div>
      <div class="form-group">
        <label class="form-label">📞 今日拨打电话目标（通）</label>
        <input class="form-input" type="number" id="d_calls" placeholder="目标通数"/>
      </div>
      <div class="form-group">
        <label class="form-label">🔥 今日意向客户目标（人）</label>
        <input class="form-input" type="number" id="d_intentCustomers" placeholder="意向客户数"/>
      </div>
      <button class="btn btn-primary" onclick="saveDailyGoal()">保存今日计划</button>
    </div>
    <div class="card goal-preview" id="dailyPreview" style="display:none;">
      <div class="section-title">今日计划一览</div>
      <div class="goal-row">
        <div class="goal-item">
          <span class="goal-num" id="prev_new">0</span>
          <span class="goal-lbl">新增客户</span>
        </div>
        <div class="goal-item">
          <span class="goal-num" id="prev_calls">0</span>
          <span class="goal-lbl">拨打电话</span>
        </div>
        <div class="goal-item">
          <span class="goal-num" id="prev_intent">0</span>
          <span class="goal-lbl">意向客户</span>
        </div>
      </div>
    </div>
  </div>
  <div id="goalMonthly" style="display:none;">
    <div class="section-title" id="monthlyTitle">月度目标</div>
    <div class="card">
      <div class="form-group">
        <label class="form-label">🎯 本月销售目标（元）</label>
        <input class="form-input" type="number" id="m_salesTarget" placeholder="目标金额" oninput="calcUnfinished()"/>
      </div>
      <div class="form-group">
        <label class="form-label">✅ 本月已达成（元）</label>
        <input class="form-input" type="number" id="m_salesDone" placeholder="已完成金额" oninput="calcUnfinished()"/>
      </div>
      <div class="form-group">
        <label class="form-label">⏳ 未达成金额（自动计算）</label>
        <input class="form-input" type="number" id="m_salesUnfinished" readonly
          style="color:#ff4d4f;background:#fff0f0;" placeholder="自动计算"/>
      </div>
      <button class="btn btn-primary" onclick="saveMonthlyGoal()">保存月度计划</button>
    </div>
    <div class="card" id="monthlyPreview" style="display:none;">
      <div class="section-title">月度完成进度</div>
      <div class="progress-row">
        <span>目标：¥<span id="m_prev_target">0</span></span>
        <span>已完成：¥<span id="m_prev_done">0</span></span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="m_progressFill" style="width:0%"></div>
      </div>
      <div class="progress-pct">
        完成率：<span id="m_pct">0</span>%
        &nbsp;&nbsp;
        <span style="color:#ff4d4f;">未达成：¥<span id="m_prev_unfinished">0</span></span>
      </div>
    </div>
  </div>
</div>

<!-- 管理页 -->
<div class="page" id="page-admin">
  <div id="adminLogin" class="card login-card">
    <div class="login-icon">🔐</div>
    <div class="login-title">管理员登录</div>
    <div class="login-sub">请输入管理员密码进入后台</div>
    <div class="form-group">
      <input class="form-input" type="password" id="adminPwd" placeholder="请输入管理员密码"/>
    </div>
    <button class="btn btn-primary" onclick="verifyAdmin()">进入后台</button>
  </div>
  <div id="adminPanel" style="display:none;">
    <div class="admin-header">
      <div class="admin-title">📊 管理后台</div>
      <div class="admin-btns">
        <div class="sync-btn" onclick="loadAdminData()">🔄 同步</div>
        <div class="out-btn"  onclick="logoutAdmin()">退出</div>
      </div>
    </div>
    <div class="top-tab">
      <div class="top-tab-item active" id="atab-overview"  onclick="switchAdminTab('overview')">总览</div>
      <div class="top-tab-item"        id="atab-customers" onclick="switchAdminTab('customers')">客户</div>
      <div class="top-tab-item"        id="atab-goals"     onclick="switchAdminTab('goals')">目标</div>
      <div class="top-tab-item"        id="atab-employee"  onclick="switchAdminTab('employee')">员工</div>
    </div>
    <div id="adminOverview"></div>
    <div id="adminCustomers" style="display:none;"></div>
    <div id="adminGoals"     style="display:none;"></div>
    <div id="adminEmployee"  style="display:none;"></div>
  </div>
</div>

<!-- 底部Tab -->
<div class="tab-bar">
  <div class="tab-item active" id="tabBtn-home"     onclick="switchTab('home')">
    <span class="tab-icon">🏠</span>首页
  </div>
  <div class="tab-item" id="tabBtn-customer" onclick="switchTab('customer')">
    <span class="tab-icon">👥</span>客户
  </div>
  <div class="tab-item" id="tabBtn-goal"     onclick="switchTab('goal')">
    <span class="tab-icon">🎯</span>目标
  </div>
  <div class="tab-item" id="tabBtn-admin"    onclick="switchTab('admin')">
    <span class="tab-icon">📊</span>管理
  </div>
</div>

<!-- 客户表单弹窗 -->
<div class="modal-mask" id="customerMask" onclick="closeCustomerForm()"></div>
<div class="modal-box" id="customerModal" style="display:none;">
  <div class="modal-title" id="customerModalTitle">添加客户</div>
  <div class="form-group">
    <label class="form-label">姓名 *</label>
    <input class="form-input" id="f_name" placeholder="请输入客户姓名"/>
  </div>
  <div class="form-group">
    <label class="form-label">电话 *</label>
    <input class="form-input" id="f_phone" type="tel" placeholder="联系电话"/>
  </div>
  <div class="form-group">
    <label class="form-label">公司</label>
    <input class="form-input" id="f_company" placeholder="公司名称"/>
  </div>
  <div class="form-group">
    <label class="form-label">职位</label>
    <input class="form-input" id="f_position" placeholder="职位"/>
  </div>
  <div class="form-group">
    <label class="form-label">来源渠道</label>
    <input class="form-input" id="f_source" placeholder="如：转介绍、电话开发"/>
  </div>
  <div class="form-group">
    <label class="form-label">意向金额（元）</label>
    <input class="form-input" id="f_intentAmount" type="number" placeholder="预计成交金额"/>
  </div>
  <div class="form-group">
    <label class="form-label">客户状态</label>
    <select class="form-select" id="f_status">
      <option value="follow">跟进中</option>
      <option value="intent">意向客户</option>
      <option value="deal">已成交</option>
      <option value="lost">已流失</option>
    </select>
  </div>
  <div class="form-group">
    <label class="form-label">备注</label>
    <textarea class="form-textarea" id="f_remark" placeholder="跟进备注..."></textarea>
  </div>
  <button class="btn btn-primary" onclick="submitCustomer()" style="margin-bottom:10px;">保存</button>
  <button class="btn btn-gray"    onclick="closeCustomerForm()">取消</button>
</div>

<script>
// ✅ 已填入你的Firebase配置
const firebaseConfig = {
  apiKey:            "AIzaSyBvQRKoNHHS3QumbLbh7TsLWz9B6ntUl9w",
  authDomain:        "salescrm-722ad.firebaseapp.com",
  projectId:         "salescrm-722ad",
  storageBucket:     "salescrm-722ad.firebasestorage.app",
  messagingSenderId: "14749042485",
  appId:             "1:14749042485:web:a0517b8b075cf9a2e52e7c"
};

firebase.initializeApp(firebaseConfig);
const db   = firebase.firestore();
const auth = firebase.auth();

let currentUser     = null;
let allCustomers    = [];
let editingCustomerId = null;
let dailyGoalId     = null;
let monthlyGoalId   = null;
const ADMIN_PWD     = 'admin888'; // ⚠️ 可自行修改管理员密码

// ============================================================
// 初始化
// ============================================================
window.onload = () => {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
  const now = new Date();
  const dateStr = now.toLocaleDateString('zh-CN', {
    year:'numeric', month:'long', day:'numeric', weekday:'long'
  });
  const today = now.toISOString().slice(0,10);
  const month = today.slice(0,7);
  document.getElementById('homeDate').textContent      = dateStr;
  document.getElementById('dailyTitle').textContent    = `今日目标（${today}）`;
  document.getElementById('monthlyTitle').textContent  = `月度目标（${month}）`;

  auth.signInAnonymously().then(result => {
    currentUser = result.user;
    const shortId = currentUser.uid.slice(0,4).toUpperCase();
    document.getElementById('homeUserName').textContent = '员工' + shortId;
    document.getElementById('headerSub').textContent    = '员工ID：' + currentUser.uid.slice(0,8);
    loadHomeData();
    loadCustomers();
    loadGoals();
    if (localStorage.getItem('adminVerified') === 'yes') {
      document.getElementById('adminLogin').style.display = 'none';
      document.getElementById('adminPanel').style.display = 'block';
    }
  }).catch(err => {
    document.getElementById('headerSub').textContent = '加载失败，请刷新重试';
    console.error(err);
  });
};

// ============================================================
// Tab 切换
// ============================================================
function switchTab(tab) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
  document.getElementById('tabBtn-' + tab).classList.add('active');
  if (tab === 'home')     loadHomeData();
  if (tab === 'customer') loadCustomers();
  if (tab === 'goal')     loadGoals();
  if (tab === 'admin' && localStorage.getItem('adminVerified') === 'yes') {
    document.getElementById('adminLogin').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    loadAdminData();
  }
}

// ============================================================
// 首页
// ============================================================
function loadHomeData() {
  if (!currentUser) return;
  const today = new Date().toISOString().slice(0,10);
  const month = today.slice(0,7);

  db.collection('goals')
    .where('uid','==',currentUser.uid)
    .where('type','==','daily')
    .where('date','==',today)
    .get().then(snap => {
      const card = document.getElementById('homeDailyCard');
      if (!snap.empty) {
        const g = snap.docs[0].data();
        card.innerHTML = `
          <div class="stat-row">
            <div><span class="stat-num">${g.newCustomers||0}</span><span class="stat-label">新增客户</span></div>
            <div><span class="stat-num">${g.calls||0}</span><span class="stat-label">拨打电话</span></div>
            <div><span class="stat-num">${g.intentCustomers||0}</span><span class="stat-label">意向客户</span></div>
          </div>`;
      } else {
        card.innerHTML = '<div class="empty">暂无今日计划，去"目标"页面设定</div>';
      }
    });

  db.collection('goals')
    .where('uid','==',currentUser.uid)
    .where('type','==','monthly')
    .where('month','==',month)
    .get().then(snap => {
      const card = document.getElementById('homeMonthCard');
      if (!snap.empty) {
        const g = snap.docs[0].data();
        const pct = g.salesTarget > 0
          ? Math.min(Math.round(g.salesDone/g.salesTarget*100),100) : 0;
        card.innerHTML = `
          <div class="progress-row">
            <span>目标：¥${g.salesTarget||0}</span>
            <span>已完成：¥${g.salesDone||0}</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" style="width:${pct}%"></div>
          </div>
          <div class="progress-pct">
            完成率：${pct}%
            &nbsp;&nbsp;
            <span style="color:#ff4d4f;">未达成：¥${g.salesUnfinished||0}</span>
          </div>`;
      } else {
        card.innerHTML = '<div class="empty">暂无月度计划</div>';
      }
    });
}

// ============================================================
// 客户管理
// ============================================================
function loadCustomers() {
  if (!currentUser) return;
  db.collection('customers')
    .where('uid','==',currentUser.uid)
    .orderBy('createTime','desc')
    .get().then(snap => {
      allCustomers = snap.docs.map(d => ({ id:d.id, ...d.data() }));
      renderCustomers(allCustomers);
    });
}

function renderCustomers(list) {
  const container = document.getElementById('customerList');
  if (list.length === 0) {
    container.innerHTML = '<div class="empty">暂无客户，点击上方添加</div>';
    return;
  }
  const statusLabel = { follow:'跟进中', intent:'意向客户', deal:'已成交', lost:'已流失' };
  container.innerHTML = list.map(c => `
    <div class="card" style="margin-bottom:12px;">
      <div class="customer-header">
        <span class="customer-name"></span>
        <span class="tag tag-"></span>
      </div>
      <div class="customer-info">📞 </div>
      </div>` : ''}
      </div>` : ''}
      </div>` : ''}
      <div class="action-row">
        <button class="btn-sm btn-edit-sm" onclick="editCustomer('')">编辑</button>
        <button class="btn-sm btn-del-sm"  onclick="deleteCustomer('')">删除</button>
      </div>
    </div>
  `).join('');
}

function searchCustomers() {
  const key = document.getElementById('searchInput').value.trim();
  if (!key) { renderCustomers(allCustomers); return; }
  const result = allCustomers.filter(c =>
    c.name.includes(key) ||
    c.phone.includes(key) ||
    (c.company||'').includes(key)
  );
  renderCustomers(result);
}

function showCustomerForm() {
  editingCustomerId = null;
  document.getElementById('customerModalTitle').textContent = '添加客户';
  ['f_name','f_phone','f_company','f_position','f_source','f_remark','f_intentAmount']
    .forEach(id => document.getElementById(id).value = '');
  document.getElementById('f_status').value = 'follow';
  document.getElementById('customerMask').classList.add('show');
  document.getElementById('customerModal').style.display = 'block';
}

function editCustomer(id) {
  const c = allCustomers.find(x => x.id === id);
  if (!c) return;
  editingCustomerId = id;
  document.getElementById('customerModalTitle').textContent = '编辑客户';
  document.getElementById('f_name').value         = c.name || '';
  document.getElementById('f_phone').value        = c.phone || '';
  document.getElementById('f_company').value      = c.company || '';
  document.getElementById('f_position').value     = c.position || '';
  document.getElementById('f_source').value       = c.source || '';
  document.getElementById('f_intentAmount').value = c.intentAmount || '';
  document.getElementById('f_status').value       = c.status || 'follow';
  document.getElementById('f_remark').value       = c.remark || '';
  document.getElementById('customerMask').classList.add('show');
  document.getElementById('customerModal').style.display = 'block';
}

function closeCustomerForm() {
  document.getElementById('customerMask').classList.remove('show');
  document.getElementById('customerModal').style.display = 'none';
}

function submitCustomer() {
  const name  = document.getElementById('f_name').value.trim();
  const phone = document.getElementById('f_phone').value.trim();
  if (!name || !phone) { alert('姓名和电话必填'); return; }
  const data = {
    uid:          currentUser.uid,
    name, phone,
    company:      document.getElementById('f_company').value.trim(),
    position:     document.getElementById('f_position').value.trim(),
    source:       document.getElementById('f_source').value.trim(),
    intentAmount: document.getElementById('f_intentAmount').value.trim(),
    status:       document.getElementById('f_status').value,
    remark:       document.getElementById('f_remark').value.trim(),
    updateTime:   firebase.firestore.FieldValue.serverTimestamp()
  };
  const op = editingCustomerId
    ? db.collection('customers').doc(editingCustomerId).update(data)
    : db.collection('customers').add({
        ...data,
        createTime: firebase.firestore.FieldValue.serverTimestamp()
      });
  op.then(() => {
    showToast(editingCustomerId ? '更新成功' : '添加成功');
    closeCustomerForm();
    loadCustomers();
  }).catch(err => alert('保存失败：' + err.message));
}

function deleteCustomer(id) {
  if (!confirm('确认删除？删除后无法恢复')) return;
  db.collection('customers').doc(id).delete()
    .then(() => { showToast('已删除'); loadCustomers(); });
}

// ============================================================
// 目标管理
// ============================================================
function switchGoalTab(tab) {
  document.getElementById('goalDaily').style.display   = tab === 'daily'   ? 'block' : 'none';
  document.getElementById('goalMonthly').style.display = tab === 'monthly' ? 'block' : 'none';
  document.getElementById('tab-daily').classList.toggle('active',   tab === 'daily');
  document.getElementById('tab-monthly').classList.toggle('active', tab === 'monthly');
}

function loadGoals() {
  if (!currentUser) return;
  const today = new Date().toISOString().slice(0,10);
  const month = today.slice(0,7);

  db.collection('goals')
    .where('uid','==',currentUser.uid)
    .where('type','==','daily')
    .where('date','==',today)
    .get().then(snap => {
      if (!snap.empty) {
        const doc = snap.docs[0];
        dailyGoalId = doc.id;
        const g = doc.data();
        document.getElementById('d_newCustomers').value    = g.newCustomers || '';
        document.getElementById('d_calls').value           = g.calls || '';
        document.getElementById('d_intentCustomers').value = g.intentCustomers || '';
        document.getElementById('prev_new').textContent    = g.newCustomers || 0;
        document.getElementById('prev_calls').textContent  = g.calls || 0;
        document.getElementById('prev_intent').textContent = g.intentCustomers || 0;
        document.getElementById('dailyPreview').style.display = 'block';
      } else {
        dailyGoalId = null;
        document.getElementById('dailyPreview').style.display = 'none';
      }
    });

  db.collection('goals')
    .where('uid','==',currentUser.uid)
    .where('type','==','monthly')
    .where('month','==',month)
    .get().then(snap => {
      if (!snap.empty) {
        const doc = snap.docs[0];
        monthlyGoalId = doc.id;
        const g = doc.data();
        const pct = g.salesTarget > 0
          ? Math.min(Math.round(g.salesDone/g.salesTarget*100),100) : 0;
        document.getElementById('m_salesTarget').value         = g.salesTarget || '';
        document.getElementById('m_salesDone').value           = g.salesDone || '';
        document.getElementById('m_salesUnfinished').value     = g.salesUnfinished || '';
        document.getElementById('m_prev_target').textContent   = g.salesTarget || 0;
        document.getElementById('m_prev_done').textContent     = g.salesDone || 0;
        document.getElementById('m_prev_unfinished').textContent = g.salesUnfinished || 0;
        document.getElementById('m_pct').textContent           = pct;
        document.getElementById('m_progressFill').style.width  = pct + '%';
        document.getElementById('monthlyPreview').style.display = 'block';
      } else {
        monthlyGoalId = null;
        document.getElementById('monthlyPreview').style.display = 'none';
      }
    });
}

function calcUnfinished() {
  const t = Number(document.getElementById('m_salesTarget').value) || 0;
  const d = Number(document.getElementById('m_salesDone').value)   || 0;
  document.getElementById('m_salesUnfinished').value = Math.max(t - d, 0);
}

function saveDailyGoal() {
  if (!currentUser) return;
  const today = new Date().toISOString().slice(0,10);
  const data = {
    uid:             currentUser.uid,
    type:            'daily',
    date:            today,
    newCustomers:    Number(document.getElementById('d_newCustomers').value)    || 0,
    calls:           Number(document.getElementById('d_calls').value)           || 0,
    intentCustomers: Number(document.getElementById('d_intentCustomers').value) || 0,
    updateTime:      firebase.firestore.FieldValue.serverTimestamp()
  };
  const op = dailyGoalId
    ? db.collection('goals').doc(dailyGoalId).update(data)
    : db.collection('goals').add({
        ...data,
        createTime: firebase.firestore.FieldValue.serverTimestamp()
      });
  op.then(() => { showToast('保存成功'); loadGoals(); loadHomeData(); });
}

function saveMonthlyGoal() {
  if (!currentUser) return;
  const month = new Date().toISOString().slice(0,7);
  const data = {
    uid:             currentUser.uid,
    type:            'monthly',
    month,
    salesTarget:     Number(document.getElementById('m_salesTarget').value)     || 0,
    salesDone:       Number(document.getElementById('m_salesDone').value)       || 0,
    salesUnfinished: Number(document.getElementById('m_salesUnfinished').value) || 0,
    updateTime:      firebase.firestore.FieldValue.serverTimestamp()
  };
  const op = monthlyGoalId
    ? db.collection('goals').doc(monthlyGoalId).update(data)
    : db.collection('goals').add({
        ...data,
        createTime: firebase.firestore.FieldValue.serverTimestamp()
      });
  op.then(() => { showToast('保存成功'); loadGoals(); loadHomeData(); });
}

function verifyAdmin() {
  const pwd = document.getElementById('adminPwd').value;
  if (pwd === ADMIN_PWD) {
    localStorage.setItem('adminVerified','yes');
    document.getElementById('adminLogin').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    loadAdminData();
  } else {
    alert('密码错误');
  }
}

function logoutAdmin() {
  localStorage.removeItem('adminVerified');
  document.getElementById('adminLogin').style.display = 'block';
  document.getElementById('adminPanel').style.display = 'none';
  document.getElementById('adminPwd').value = '';
}

function switchAdminTab(tab) {
  ['overview','customers','goals','employee'].forEach(t => {
    const key = t.charAt(0).toUpperCase() + t.slice(1);
    document.getElementById('admin' + key).style.display = t === tab ? 'block' : 'none';
    document.getElementById('atab-' + t).classList.toggle('active', t === tab);
  });
}

      // 渲染总览

      // 渲染全员客户列表

              <span class="tag tag-"></span>

      // 渲染员工分布

// ============================================================
// 工具函数
// ============================================================
function showToast(msg) {
  const toast = document.createElement('div');
  toast.textContent = msg;
  toast.style.cssText = `
    position:fixed; bottom:100px; left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,0.7); color:#fff;
    padding:10px 24px; border-radius:20px;
    font-size:14px; z-index:9999;`;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2000);
}
